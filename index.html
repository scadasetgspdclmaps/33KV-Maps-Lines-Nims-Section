<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d1b2a;--panel:#0f2236ee;--live:#00c8ff;--ug:#2196f3;--oh:#f44336;
  --ab:#ff9800;--dp:#9c27b0;--cut:#78909c;--fault:#ff1744;--trip:#ffab00;
  --ok:#00e676;--border:rgba(0,200,255,0.18);--text:#b0cce0;
  --mono:'Share Tech Mono',monospace;--sans:'Arial',sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--navy)}

/* MAP */
#map{position:fixed;inset:52px 0 38px 0;z-index:1}
.leaflet-control-zoom a{background:var(--panel)!important;color:var(--live)!important;border:none!important;}
.leaflet-control-scale-line{background:rgba(13,27,42,.9)!important;color:var(--live)!important;font-family:var(--mono)!important;}

/* TOP BAR */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;height:52px;
  background:linear-gradient(135deg,#0a1520f0,#0f2236f0);
  backdrop-filter:blur(18px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:12px;
}
.tb-logo{font-family:var(--mono);font-size:13px;color:var(--live);letter-spacing:2px;}
.tb-title{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--text);flex:1;}
#srchInput{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:20px;padding:6px 14px 6px 34px;color:var(--text);width:190px;transition:all .3s}
#srchInput:focus{width:250px;border-color:var(--live)}

/* PANEL */
#panel{
  position:fixed;top:52px;left:0;bottom:38px;z-index:900;width:258px;
  background:linear-gradient(180deg,#0a1828f8,#0d1f33f8);
  backdrop-filter:blur(22px);border-right:1px solid var(--border);
  display:flex;flex-direction:column;transition:transform .32s var(--ease);
  overflow-y:auto;
}
#panel.off{transform:translateX(-100%)}
.psec{padding:13px 15px 9px;border-bottom:1px solid rgba(0,200,255,.07)}
.psec-t{font-family:var(--mono);font-size:9px;color:rgba(0,200,255,.55);letter-spacing:2px;margin-bottom:9px}

/* Layer & Feeder Rows */
.lrow{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:0.2s}
.lrow:hover{background:rgba(0,200,255,.07)}
.lname{font-family:var(--sans);font-size:13px;color:var(--text);flex:1}
.tog{width:30px;height:17px;border-radius:9px;background:rgba(255,255,255,.09);position:relative;transition:0.25s}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:white;transition:0.25s}
.lrow:not(.off) .tog{background:var(--live)}
.lrow:not(.off) .tog::after{transform:translateX(13px)}

/* Global Utility Styles */
.radar-ping { width: 40px; height: 40px; background: rgba(255, 23, 68, 0.6); border-radius: 50%; animation: ping-anim 1.5s ease-out infinite; pointer-events: none; }
@keyframes ping-anim { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

/* Energy Flow Dots */
@keyframes energy-flow-overlay { to { stroke-dashoffset: -24; } }
.feeder-flow-overlay { stroke-dasharray: 4 20; stroke-linecap: round; animation: energy-flow-overlay 0.8s linear infinite; pointer-events: none; }
@keyframes sos-blink { 0%, 100% { opacity: 1; filter: drop-shadow(0 0 12px #ff1744); } 50% { opacity: 0.2; } }
.feeder-breakdown { animation: sos-blink 0.8s ease-in-out infinite !important; }

/* Status Controls */
.fi-btn { flex:1;padding:2px 4px;border-radius:4px;border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.05);color:rgba(176,204,224,.6); font-family:var(--mono);font-size:8px; cursor:pointer; }
.fi-live.fi-active { background:rgba(0,200,83,.25);color:#00c853;border-color:#00c853; }
.fi-breakdown.fi-active { background:rgba(255,23,68,.25);color:#ff1744;border-color:#ff1744; animation:sos-blink 0.8s infinite; }

/* Legend & Bottom Bar */
#botbar{position:fixed;bottom:0;left:0;right:0;z-index:900;height:38px;background:rgba(9,22,37,.9);display:flex;align-items:center;padding:0 14px;color:rgba(176,204,224,.35);font-family:var(--mono);font-size:10px;}
#coords{color:var(--live);margin-left:5px;}
</style>

<body>

<div id="topbar">
  <div class="tb-logo">TGSPDCL</div>
  <div class="tb-title">NIMS Circle — 33KV Distribution GIS</div>
  <div id="srchWrap">
    <input id="srchInput" placeholder="Search NIMS pole, cable..."/>
  </div>
</div>

<div id="panel">
  <div class="psec">
    <div class="psec-t">// NIMS FEEDER NETWORK</div>
    <div id="feederChecks"></div>
  </div>
  <div class="psec">
    <div class="psec-t">// SYSTEM LAYERS</div>
    <div class="lrow" onclick="toggleLyr('ug-lines')"><div class="lname">UG Cables</div><div class="tog" id="tog-ug"></div></div>
    <div class="lrow" onclick="toggleLyr('points')"><div class="lname">NIMS Points</div><div class="tog" id="tog-pts"></div></div>
  </div>
</div>

<div id="map"></div>

<div id="botbar">
  <span>COORDS: <span id="coords">0.00, 0.00</span></span>
  <span style="margin-left:auto">NIMS SECTION · 33KV GIS · 2026</span>
</div>

<script>
// 1. MAP CORE
const map = L.map('map',{ center:[17.4200, 78.4500], zoom:16, zoomControl:false });
map.createPane('pointsPane').style.zIndex = 650;
map.createPane('flowPane').style.zIndex = 401;
map.getPane('flowPane').style.pointerEvents = 'none';

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

// 2. DATA REGISTRY
const DATA_REGISTRY = [
  { varName:'json_33KVGunnrockNIMS_5', type:'lines', feeder:'GUNROCK → NIMS', cable:'UG' },
  { varName:'json_33KVNIMSPunjagutta_10', type:'lines', feeder:'NIMS → PUNJAGUTTA', cable:'UG' },
  { varName:'json_33KVAnandnagarErramanjil_15', type:'lines', feeder:'ANANDNAGAR → ERRAMANJIL', cable:'UG' },
  { varName:'json_132KVERRAGADDA33KVNIMS_20', type:'lines', feeder:'ERRAGADDA → NIMS', cable:'UG' },
  { varName:'json_132KVGUNROCK33KVNIMS_25', type:'lines', feeder:'GUNROCK → NIMS 2', cable:'UG' },
  { varName:'json_132KVGUNROCK33KVERRAMANJIL_30', type:'lines', feeder:'GUNROCK → ERRAMANJIL', cable:'UG' },
  { varName:'json_132KVASIFNAGAR33KVNIMS_35', type:'lines', feeder:'ASIFNAGAR → NIMS', cable:'UG' },
  { varName:'json_132KVASIFNAGAR33KVPUNJAGUTTA_40', type:'lines', feeder:'ASIFNAGAR → PUNJAGUTTA', cable:'UG' },
  { varName:'json_132KVASIFNAGAR33KVANANDNAGAR_45', type:'lines', feeder:'ASIFNAGAR → ANANDNAGAR', cable:'UG' },
  { varName:'json_33KVGunnrockNIMS_1', type:'points', feeder:'NIMS NETWORK', cable:'UG' }
];

const allLayers = [];
const feederNames = new Set();
const feederStatus = {};
const feederState = {};

// 3. ENGINE: LOAD & RENDER
DATA_REGISTRY.forEach(reg => {
    const data = window[reg.varName];
    if(!data) return;

    data.features.forEach(feat => {
        const props = feat.properties || {};
        const fName = props['Feeder Name'] || reg.feeder;
        feederNames.add(fName);

        let layer;
        if(feat.geometry.type.includes('Line')){
            const coords = feat.geometry.coordinates.map(c => [c[1], c[0]]);
            layer = L.polyline(coords, {color: '#2196f3', weight: 6, opacity: 0.9});
            
            layer.flowLayer = L.polyline(coords, {
                color: '#ffffff', weight: 3, className: 'feeder-flow-overlay', pane: 'flowPane'
            });
        } else {
            const ll = [feat.geometry.coordinates[1], feat.geometry.coordinates[0]];
            layer = L.circleMarker(ll, {radius: 4, color: '#00c8ff', pane: 'pointsPane'});
        }

        if(layer){
            layer.bindPopup(`<b>NIMS GIS</b><br>Feeder: ${fName}`);
            allLayers.push({layer, fName, type: reg.type});
            layer.addTo(map);
            if(layer.flowLayer) layer.flowLayer.addTo(map);
        }
    });
});

// 4. UI: FEEDER LIST
function buildFeederList() {
    const cont = document.getElementById('feederChecks');
    [...feederNames].forEach((fn, i) => {
        feederState[fn] = true;
        const row = document.createElement('div');
        row.className = 'ftog-row';
        row.style.padding = '8px';
        row.innerHTML = `
            <div style="display:flex;align-items:center;gap:6px">
                <span class="lname" onclick="focusFeeder('${fn}')">${fn}</span>
                <div class="tog" id="ftog-${i}" onclick="toggleFeeder('${fn}', ${i})"></div>
            </div>
            <div style="display:flex;gap:3px;margin-top:5px">
                <button class="fi-btn fi-live fi-active" onclick="setStatus('${fn}','live')">Live</button>
                <button class="fi-btn fi-breakdown" onclick="setStatus('${fn}','breakdown')">Down</button>
            </div>
        `;
        cont.appendChild(row);
    });
}

// 5. FUNCTIONS: STATUS & TOGGLES
function setStatus(fn, status) {
    feederStatus[fn] = status;
    allLayers.forEach(item => {
        if(item.fName === fn && item.layer.setStyle) {
            if(status === 'breakdown') {
                item.layer.setStyle({color: '#ff1744', weight: 8});
                if(item.layer.getElement()) item.layer.getElement().classList.add('feeder-breakdown');
                if(item.layer.flowLayer) map.removeLayer(item.layer.flowLayer);
            } else {
                item.layer.setStyle({color: '#2196f3', weight: 6});
                if(item.layer.getElement()) item.layer.getElement().classList.remove('feeder-breakdown');
                if(item.layer.flowLayer) map.addLayer(item.layer.flowLayer);
            }
        }
    });
}

function toggleFeeder(fn, idx) {
    feederState[fn] = !feederState[fn];
    document.getElementById('ftog-'+idx).parentElement.parentElement.classList.toggle('off', !feederState[fn]);
    allLayers.forEach(i => {
        if(i.fName === fn) {
            feederState[fn] ? map.addLayer(i.layer) : map.removeLayer(i.layer);
            if(i.layer.flowLayer) feederState[fn] ? map.addLayer(i.layer.flowLayer) : map.removeLayer(i.layer.flowLayer);
        }
    });
}

function focusFeeder(fn) {
    const coords = [];
    allLayers.forEach(i => {
        if(i.fName === fn && i.layer.getLatLngs) coords.push(...i.layer.getLatLngs());
    });
    if(coords.length) map.fitBounds(L.latLngBounds(coords), {padding:[50,50]});
}

map.on('mousemove', e => {
    document.getElementById('coords').textContent = e.latlng.lat.toFixed(5) + ', ' + e.latlng.lng.toFixed(5);
});

buildFeederList();
</script>

<style>
/* CSS: EXACT REPLICATION OF MASTER TEMPLATE */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d1b2a;--panel:#0f2236ee;--live:#00c8ff;--ug:#2196f3;--oh:#f44336;
  --ab:#ff9800;--dp:#9c27b0;--cut:#78909c;--fault:#ff1744;--ok:#00e676;
  --border:rgba(0,200,255,0.18);--text:#b0cce0;
  --mono:'Share Tech Mono',monospace;--sans:'Arial',sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--navy)}

#map{position:fixed;inset:52px 0 38px 0;z-index:1}
.leaflet-tile{transition:opacity .35s ease!important}
.leaflet-control-zoom a{background:var(--panel)!important;color:var(--live)!important;border:none!important;width:34px!important;height:34px!important;line-height:34px!important}
.leaflet-control-scale-line{background:rgba(13,27,42,.9)!important;border-color:rgba(0,200,255,.4)!important;color:var(--live)!important;font-family:var(--mono)!important;font-size:10px!important}

/* TOP BAR */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;height:52px;
  background:linear-gradient(135deg,#0a1520f0,#0f2236f0);
  backdrop-filter:blur(18px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:12px;
  box-shadow:0 2px 20px rgba(0,0,0,.4)
}
.tb-logo{font-family:var(--mono);font-size:13px;color:var(--live);letter-spacing:2px;white-space:nowrap}
.tb-sep{width:1px;height:28px;background:var(--border);flex-shrink:0}
.tb-title{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* SEARCH & RADAR */
#srchWrap{position:relative;flex-shrink:0}
#srchInput{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:20px;padding:6px 14px 6px 34px;color:var(--text);font-family:var(--sans);font-size:13px;width:190px;outline:none;transition:all .3s}
#srchInput:focus{width:250px;background:rgba(0,200,255,.08);border-color:var(--live)}
.srch-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(176,204,224,.35);font-size:14px;pointer-events:none}

.radar-ping { width:40px;height:40px;background:rgba(255,23,68,0.6);border-radius:50%;animation:ping-anim 1.5s ease-out infinite;pointer-events:none;margin-left:-20px;margin-top:-20px }
@keyframes ping-anim { 0%{transform:scale(0);opacity:1} 100%{transform:scale(2.5);opacity:0} }

/* SIDE PANEL */
#panel{
  position:fixed;top:52px;left:0;bottom:38px;z-index:900;width:258px;
  background:linear-gradient(180deg,#0a1828f8,#0d1f33f8);
  backdrop-filter:blur(22px);border-right:1px solid var(--border);
  display:flex;flex-direction:column;transition:transform .32s var(--ease);
  box-shadow:4px 0 28px rgba(0,0,0,.4);
  overflow-y:auto;overflow-x:hidden;
}
#panel.off{transform:translateX(-100%)}

.psec{padding:13px 15px 9px;border-bottom:1px solid rgba(0,200,255,.07)}
.psec-t{font-family:var(--mono);font-size:9px;color:rgba(0,200,255,.55);letter-spacing:2px;margin-bottom:9px}

/* LAYER ROWS */
.lrow{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:background .2s;margin-bottom:2px;user-select:none}
.lrow:hover{background:rgba(0,200,255,.07)}
.lswatch{width:26px;height:5px;border-radius:3px;flex-shrink:0}
.lswatch.dot{width:11px;height:11px;border-radius:50%;border:2px solid}
.lname{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--text);flex:1}
.tog{width:30px;height:17px;border-radius:9px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);position:relative;transition:0.25s}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.35);transition:transform .25s var(--ease)}
.lrow:not(.off) .tog{background:rgba(0,200,255,.28);border-color:var(--live)}
.lrow:not(.off) .tog::after{transform:translateX(13px);background:var(--live)}

/* FEEDER STATUS BADGES */
.fi-btn-grp { display:flex;gap:3px;padding-left:16px;margin-top:3px;width:100% }
.fi-btn { flex:1;padding:2px 4px;border-radius:4px;border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.05);color:rgba(176,204,224,.6); font-family:var(--mono);font-size:8px;letter-spacing:.5px; cursor:pointer;transition:all .18s }
.fi-live.active { background:rgba(0,200,83,.25);color:#00c853;border-color:#00c853 }
.fi-breakdown.active { background:rgba(255,23,68,.25);color:#ff1744;border-color:#ff1744; animation:sos-blink 0.8s infinite }

/* ANIMATIONS */
@keyframes energy-flow-overlay { to { stroke-dashoffset: -24; } }
.feeder-flow-overlay { stroke-dasharray: 4 20; stroke-linecap: round; animation: energy-flow-overlay 0.8s linear infinite; pointer-events: none; }
@keyframes sos-blink { 0%,100% { opacity: 1; filter: drop-shadow(0 0 12px #ff1744); } 50% { opacity: 0.2; } }
.feeder-breakdown { animation: sos-blink 0.8s ease-in-out infinite !important; }

/* SS SYMBOLS */
@keyframes ss33-ring-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.ss33-wrap { position:relative; width:36px;height:36px; display:flex;align-items:center;justify-content:center; }
.ss33-ring { position:absolute;inset:0; border-radius:50%; border:2px dashed rgba(0,180,255,0.9); animation: ss33-ring-spin 4s linear infinite; }
.ss33-core { width:22px;height:22px;border-radius:50%; background:radial-gradient(circle, #1e88e5 0%, #0d47a1 100%); border:2px solid #fff; display:flex;align-items:center;justify-content:center; z-index:1; color:white; font-size:11px; }

#botbar{position:fixed;bottom:0;left:0;right:0;z-index:900;height:38px;background:rgba(9,22,37,.9);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;color:rgba(176,204,224,.35);font-family:var(--mono);font-size:10px;}
#coords{color:var(--live)}
</style>
</head>
<body>

<div id="topbar">
  <div class="tb-logo">TGSPDCL</div>
  <div class="tb-sep"></div>
  <div class="tb-title">NIMS Circle — 33KV Distribution GIS Network</div>
  <div id="srchWrap">
    <input id="srchInput" placeholder="Search pole, cable, feeder..."/>
    <span class="srch-ic">⌕</span>
  </div>
  <div style="font-family:var(--mono);font-size:10px;color:var(--ok);border:1px solid rgba(0,230,118,.3);padding:4px 12px;border-radius:20px">● SYSTEM LIVE</div>
</div>

<div id="panel">
  <div class="psec">
    <div class="psec-t" style="display:flex;justify-content:space-between">FEEDER NETWORK <span onclick="toggleAll(true)" style="cursor:pointer;color:var(--live)">ALL ON</span></div>
    <div id="feederList"></div>
  </div>
  <div class="psec">
    <div class="psec-t">SYSTEM LAYERS</div>
    <div class="lrow" id="lyr-ug-lines" onclick="toggleLyr('ug-lines')"><div class="lswatch" style="background:#2196f3"></div><div class="lname">UG Main Lines</div><div class="tog"></div></div>
    <div class="lrow" id="lyr-points" onclick="toggleLyr('points')"><div class="lswatch dot" style="border-color:#00c8ff"></div><div class="lname">NIMS Points</div><div class="tog"></div></div>
    <div class="lrow" id="lyr-ss33" onclick="toggleLyr('ss33')"><div class="lswatch dot" style="background:#0d47a1"></div><div class="lname">33/11KV Substations</div><div class="tog"></div></div>
  </div>
</div>

<div id="map"></div>

<div id="botbar">
  <span>COORD: <span id="coords">17.4200, 78.4500</span></span>
  <span style="margin-left:auto;opacity:0.4">NIMS SECTION · 33KV GIS · TGSPDCL SCADA SECTION</span>
</div>

<script>
// ── 1. MAP CORE & Z-INDEX PANES ──
const map = L.map('map',{
  center:[17.4200, 78.4500], zoom:16, zoomControl:false, preferCanvas:true
});
map.createPane('pointsPane').style.zIndex = 650;
map.createPane('flowPane').style.zIndex = 401;
map.getPane('flowPane').style.pointerEvents = 'none';

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

// ── 2. DATA REGISTRY (FULLY MAPPED FOR NIMS) ──
const DATA_REGISTRY = [
  { varName:'json_33KVGunnrockNIMS_5', type:'lines', feeder:'GUNROCK → NIMS', cable:'UG' },
  { varName:'json_33KVNIMSPunjagutta_10', type:'lines', feeder:'NIMS → PUNJAGUTTA', cable:'UG' },
  { varName:'json_33KVAnandnagarErramanjil_15', type:'lines', feeder:'ANANDNAGAR → ERRAMANJIL', cable:'UG' },
  { varName:'json_132KVERRAGADDA33KVNIMS_20', type:'lines', feeder:'ERRAGADDA → NIMS', cable:'UG' },
  { varName:'json_132KVGUNROCK33KVNIMS_25', type:'lines', feeder:'GUNROCK → NIMS 2', cable:'UG' },
  { varName:'json_132KVGUNROCK33KVERRAMANJIL_30', type:'lines', feeder:'GUNROCK → ERRAMANJIL', cable:'UG' },
  { varName:'json_132KVASIFNAGAR33KVNIMS_35', type:'lines', feeder:'ASIFNAGAR → NIMS', cable:'UG' },
  { varName:'json_132KVASIFNAGAR33KVPUNJAGUTTA_40', type:'lines', feeder:'ASIFNAGAR → PUNJAGUTTA', cable:'UG' },
  { varName:'json_132KVASIFNAGAR33KVANANDNAGAR_45', type:'lines', feeder:'ASIFNAGAR → ANANDNAGAR', cable:'UG' },
  { varName:'json_33KVGunnrockNIMS_1', type:'points', feeder:'NIMS NETWORK', cable:'UG' },
  { varName:'json_3311KVSSCOORDINATESWITHDATA20_76', type:'ss33', feeder:'33/11KV SS', cable:'-' }
];

const allLayers = [];
const feederNames = new Set();
const feederState = {};
const feederMode = {}; // 'live' or 'breakdown'

// ── 3. GIS RENDER ENGINE ──
function initGIS() {
  DATA_REGISTRY.forEach(reg => {
    const data = window[reg.varName];
    if(!data || !data.features) return;

    data.features.forEach(feat => {
      const props = feat.properties || {};
      const fName = props['Feeder Name'] || reg.feeder;
      feederNames.add(fName);
      if(!feederMode[fName]) { feederState[fName] = true; feederMode[fName] = 'live'; }

      let layer;
      if(feat.geometry.type.includes('Line')){
        const coords = feat.geometry.coordinates.map(c => [c[1], c[0]]);
        layer = L.polyline(coords, {color:'#2196f3', weight:6, opacity:0.9, smoothFactor:1.5});
        layer.flow = L.polyline(coords, {color:'#ffffff', weight:3, className:'feeder-flow-overlay', pane:'flowPane'});
      } else {
        const coords = feat.geometry.coordinates;
        const ll = [coords[1], coords[0]];
        if(reg.type === 'ss33'){
          const ssHtml = `<div class="ss33-wrap"><div class="ss33-ring"></div><div class="ss33-core">⚡</div></div>`;
          layer = L.marker(ll, {icon:L.divIcon({className:'', html:ssHtml, iconSize:[36,36]})});
        } else {
          layer = L.circleMarker(ll, {radius:4, fillColor:'#fff', color:'#00c8ff', weight:2, pane:'pointsPane', fillOpacity:1});
        }
      }

      if(layer){
        layer.bindPopup(buildTable(props, fName));
        allLayers.push({layer, fName, type:reg.type});
        layer.addTo(map);
        if(layer.flow) layer.flow.addTo(map);
      }
    });
  });
  buildUI();
}

function buildTable(p, fn){
  let h = `<b>${fn}</b><table style="width:100%;margin-top:8px;font-size:11px">`;
  Object.keys(p).forEach(k => { h += `<tr><th align="left">${k}</th><td>${p[k]}</td></tr>`; });
  return h + `</table>`;
}

// ── 4. UI BUILDER & LOGIC ──
function buildUI() {
  const list = document.getElementById('feederList');
  [...feederNames].sort().forEach((fn, i) => {
    const row = document.createElement('div');
    row.className = 'ftog-row';
    row.innerHTML = `
      <div class="lrow" id="tog-${i}" onclick="toggleFeeder('${fn}', ${i})">
        <div class="lname" onclick="focusFeeder('${fn}', event)">${fn}</div>
        <div class="tog"></div>
      </div>
      <div class="fi-btn-grp">
        <button class="fi-btn fi-live active" id="lv-${i}" onclick="setMode('${fn}', 'live', ${i})">LIVE</button>
        <button class="fi-btn fi-breakdown" id="brk-${i}" onclick="setMode('${fn}', 'breakdown', ${i})">DOWN</button>
      </div>
    `;
    list.appendChild(row);
  });
}

function setMode(fn, mode, i) {
  feederMode[fn] = mode;
  document.getElementById(`lv-${i}`).classList.toggle('active', mode==='live');
  document.getElementById(`brk-${i}`).classList.toggle('active', mode==='breakdown');
  
  allLayers.forEach(item => {
    if(item.fName === fn && item.layer.setStyle) {
      if(mode === 'breakdown') {
        item.layer.setStyle({color:'#ff1744', weight:8});
        if(item.layer.getElement()) item.layer.getElement().classList.add('feeder-breakdown');
        if(item.layer.flow) map.removeLayer(item.layer.flow);
      } else {
        item.layer.setStyle({color:'#2196f3', weight:6});
        if(item.layer.getElement()) item.layer.getElement().classList.remove('feeder-breakdown');
        if(item.layer.flow) map.addLayer(item.layer.flow);
      }
    }
  });
}

function toggleFeeder(fn, i) {
  feederState[fn] = !feederState[fn];
  document.getElementById(`tog-${i}`).classList.toggle('off', !feederState[fn]);
  allLayers.forEach(item => {
    if(item.fName === fn) {
      feederState[fn] ? map.addLayer(item.layer) : map.removeLayer(item.layer);
      if(item.layer.flow && feederMode[fn]==='live') feederState[fn] ? map.addLayer(item.layer.flow) : map.removeLayer(item.layer.flow);
    }
  });
}

function focusFeeder(fn, e) {
  e.stopPropagation();
  const group = allLayers.filter(i => i.fName === fn && i.layer.getLatLngs);
  if(group.length) {
    const b = L.latLngBounds(group.map(i => i.layer.getLatLngs()).flat());
    map.flyToBounds(b, {padding:[50,50]});
  }
}

// ── 5. SEARCH & RADAR ──
document.getElementById('srchInput').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  if(q.length < 2) return;
  const f = allLayers.find(i => JSON.stringify(i.layer.feature?.properties || {}).toLowerCase().includes(q));
  if(f && f.layer.getLatLng) {
    const ll = f.layer.getLatLng();
    map.flyTo(ll, 19);
    L.marker(ll, {icon:L.divIcon({className:'radar-ping'})}).addTo(map);
  }
});

map.on('mousemove', e => { document.getElementById('coords').textContent = e.latlng.lat.toFixed(5)+', '+e.latlng.lng.toFixed(5); });

initGIS();
</script>
</body>

<style>
/* CSS remains identical to your master template for UI consistency */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d1b2a;--panel:#0f2236ee;--live:#00c8ff;--ug:#2196f3;--oh:#f44336;
  --ab:#ff9800;--dp:#9c27b0;--cut:#78909c;--fault:#ff1744;--trip:#ffab00;
  --ok:#00e676;--border:rgba(0,200,255,0.18);--text:#b0cce0;
  --mono:'Share Tech Mono',monospace;--sans:'Arial',sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--navy)}

#map{position:fixed;inset:52px 0 38px 0;z-index:1;background:var(--navy);cursor:grab}
#map:active{cursor:grabbing}

/* TOP BAR */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;height:52px;
  background:linear-gradient(135deg,#0a1520f0,#0f2236f0);
  backdrop-filter:blur(18px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:12px;
  box-shadow:0 2px 20px rgba(0,0,0,.4)
}
.tb-logo{font-family:var(--mono);font-size:13px;color:var(--live);letter-spacing:2px}
.tb-title{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* PANEL */
#panel{
  position:fixed;top:52px;left:0;bottom:38px;z-index:900;width:258px;
  background:linear-gradient(180deg,#0a1828f8,#0d1f33f8);
  backdrop-filter:blur(22px);border-right:1px solid var(--border);
  display:flex;flex-direction:column;transition:transform .32s var(--ease);
  overflow-y:auto;overflow-x:hidden;
}
#panel.off{transform:translateX(-100%)}

/* Layer rows & UI Components same as index(37) */
.psec{padding:13px 15px 9px;border-bottom:1px solid rgba(0,200,255,.07)}
.psec-t{font-family:var(--mono);font-size:9px;color:rgba(0,200,255,.55);letter-spacing:2px;margin-bottom:9px}
.lrow{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:0.2s}
.lswatch{width:26px;height:5px;border-radius:3px;flex-shrink:0}
.lswatch.dot{width:11px;height:11px;border-radius:50%;border:2px solid}
.lname{font-family:var(--sans);font-size:13px;color:var(--text);flex:1}
.tog{width:30px;height:17px;border-radius:9px;background:rgba(255,255,255,.09);position:relative;transition:0.25s}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:white;transition:0.25s}
.lrow:not(.off) .tog{background:var(--live)}
.lrow:not(.off) .tog::after{transform:translateX(13px)}

/* Global Animations */
@keyframes energy-flow-overlay { to { stroke-dashoffset: -24; } }
.feeder-flow-overlay { stroke-dasharray: 4 20; stroke-linecap: round; animation: energy-flow-overlay 0.8s linear infinite; pointer-events: none; }
@keyframes sos-blink { 0%,100% { opacity: 1; filter: drop-shadow(0 0 12px #ff1744); } 50% { opacity: 0.2; } }
.feeder-breakdown { animation: sos-blink 0.8s ease-in-out infinite !important; }
.hidden-flow { display: none !important; }

/* Substation Symbols */
@keyframes ss33-ring-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.ss33-wrap { position:relative; width:36px;height:36px; display:flex;align-items:center;justify-content:center; }
.ss33-ring { position:absolute;inset:0; border-radius:50%; border:2px dashed var(--live); animation: ss33-ring-spin 4s linear infinite; }
.ss33-core { width:22px;height:22px;border-radius:50%; background:#0d47a1; border:2px solid #fff; display:flex;align-items:center;justify-content:center; z-index:1; }

<div id="topbar">
  <div class="tb-logo">TGSPDCL</div>
  <div class="tb-title">Erragadda Circle — 33KV Distribution GIS</div>
  <input id="srchInput" placeholder="Search pole, feeder..."/>
  <div class="chip chip-live" style="color:var(--ok);font-family:var(--mono);font-size:10px">● LIVE</div>
</div>

<div id="panel">
  <div class="psec">
    <div class="psec-t">// FEEDERS (Erragadda Section)</div>
    <div id="feederChecks"></div>
  </div>
</div>

<div id="map"></div>

<script>
const map = L.map('map',{ center:[17.4528, 78.4412], zoom:16, zoomControl:false });
map.createPane('pointsPane').style.zIndex = 650;
map.createPane('flowPane').style.zIndex = 401;
map.getPane('flowPane').style.pointerEvents = 'none';

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

// MAPPING REGISTRY - UPDATED FOR ERRAGADDA FILE NAMES
const DATA_REGISTRY = [
  { varName:'json_33KVErragaddaAsestos_1', type:'points', feeder:'ERRAGADDA → ASBESTOS', cable:'OH' },
  { varName:'json_33KVErragaddaAsestos_Feeder_Lines_5', type:'lines', feeder:'ERRAGADDA → ASBESTOS', cable:'OH' },
  { varName:'json_33KVErragaddaESI_6', type:'points', feeder:'ERRAGADDA → ESI', cable:'UG' },
  { varName:'json_33KVErragaddaESI_Feeder_Lines_10', type:'lines', feeder:'ERRAGADDA → ESI', cable:'UG' },
  { varName:'json_33KVBalanagarErragadda_15', type:'lines', feeder:'BALANAGAR → ERRAGADDA', cable:'OH' },
  { varName:'json_132KVERRAGADDA33KVMU_20', type:'lines', feeder:'ERRAGADDA → M.U', cable:'UG' },
  { varName:'json_132KVERRAGADDA33KVMOTI_25', type:'lines', feeder:'ERRAGADDA → MOTI', cable:'UG' },
  { varName:'json_132KVERRAGADDA33KVESI_30', type:'lines', feeder:'ERRAGADDA → ESI', cable:'UG' },
  { varName:'json_132KVERRAGADDA33KVERRAGADDA_35', type:'lines', feeder:'ERRAGADDA → ERRAGADDA', cable:'UG' },
  { varName:'json_132KVERRAGADDA33KVEERRAGADDA2_40', type:'lines', feeder:'ERRAGADDA → ERRAGADDA 2', cable:'UG' },
  { varName:'json_132KVERRAGADDA33KVBORABANDA_45', type:'lines', feeder:'ERRAGADDA → BORABANDA', cable:'UG' },
  { varName:'json_132KVERRAGADDA33KVAG_50', type:'lines', feeder:'ERRAGADDA → AG', cable:'UG' },
  { varName:'json_3311KVSSCOORDINATESWITHDATA20_76', type:'ss33', feeder:'33/11KV SS', cable:'-' },
  { varName:'json_EHTSSCOORDINATESWITHDATA_82', type:'ehts', feeder:'EHT SS', cable:'-' }
];

const allLayers = [];
const feederNames = new Set();
const feederStatus = {};

// Same extraction/cleansing logic as James Street
function extractFeeder(props, fallback) {
    const keys = ['Feeder Name', 'Feeder_Name', 'feeder'];
    for(let k of keys) if(props[k]) return props[k];
    return fallback;
}

// Render Logic
DATA_REGISTRY.forEach(reg => {
    const data = window[reg.varName];
    if(!data) return;

    data.features.forEach(feat => {
        const props = feat.properties || {};
        const fName = extractFeeder(props, reg.feeder);
        feederNames.add(fName);

        let layer;
        if(reg.type === 'lines'){
            const coords = feat.geometry.coordinates.map(c => [c[1], c[0]]);
            const color = reg.cable === 'OH' ? '#f44336' : '#2196f3';
            layer = L.polyline(coords, {color: color, weight: 6, opacity: 0.9});
            
            // Flow layer
            layer.flowLayer = L.polyline(coords, {
                color: '#ffffff', weight: 3, className: 'feeder-flow-overlay', pane: 'flowPane'
            });
        } else if(reg.type === 'ss33'){
            const ll = [feat.geometry.coordinates[1], feat.geometry.coordinates[0]];
            const ssHtml = `<div class="ss33-wrap"><div class="ss33-ring"></div><div class="ss33-core">⚡</div></div>`;
            layer = L.marker(ll, {icon: L.divIcon({className:'', html:ssHtml, iconSize:[36,36]})});
        }

        if(layer){
            layer.addTo(map);
            if(layer.flowLayer) layer.flowLayer.addTo(map);
            allLayers.push({layer, fName, type: reg.type});
        }
    });
});

// UI Builder for Sidebar
function buildUI() {
    const cont = document.getElementById('feederChecks');
    [...feederNames].forEach(fn => {
        const div = document.createElement('div');
        div.className = 'lrow';
        div.innerHTML = `<div class="lname">${fn}</div><div class="tog"></div>`;
        cont.appendChild(div);
    });
}

buildUI();
</script>
</body>
